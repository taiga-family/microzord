name: 🤖 PR is ready to merge
on:
  pull_request_review:
    types: [submitted]

jobs:
  label-when-approved:
    name: Label when approved
    runs-on: ubuntu-latest
    if: github.event.review.state == 'approved'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: taiga-family/ci/actions/setup/variables@8c0c4bee63937e491ee88496e89b8e8c7abc30bd # v1.102.0
      - uses: taiga-family/ci/actions/auto/label-when-approved@8c0c4bee63937e491ee88496e89b8e8c7abc30bd # v1.102.0
        with:
          approvals: 1
          token: ${{ secrets.GITHUB_TOKEN }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
